<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="top-nav">
            <a href="https://mail.google.com/">Gmail</a>
            <a href="https://www.google.com/imghp">Images</a>
            <button class="icon-btn" title="Google apps">⋮⋮⋮</button>
            <img src="653756461_1734468694630456_6039561053204657709_n.jpg" alt="Profile Image" class="profile-img"> 
        </nav>
    </header>

    <main>
        <div class="logo-container">
            <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google Logo">
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" title="Search">
            </div>
            
            <div class="buttons">
                <button>Google Search</button>
                <button>I'm Feeling Lucky</button>
            </div>
            
            <div class="language-offer">
                Google offered in: 
                <a href="#">Tiếng Việt</a> 
                <a href="#">Français</a> 
                <a href="#">中文 (繁體)</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-location">
            Vietnam
        </div>
        <div class="footer-links">
            <div class="links-left">
                <a href="#">About</a>
                <a href="#">Advertising</a>
                <a href="#">Business</a>
                <a href="#">How Search works</a>
            </div>
            <div class="links-right">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Settings</a>
            </div>
        </div>
    </footer>

</body>
</html>
